---
- name: Install ADDS role and promote server to Domain Controller
  hosts: all
  gather_facts: false

  vars_files:
    - vars.yml

  tasks:

    - name: Install the AD Domain Services Windows feature
      ansible.windows.win_feature:
        name: AD-Domain-Services
        include_management_tools: true
        state: present

    - name: Promote server to Domain Controller (creates new forest)
      microsoft.ad.domain:
        dns_domain_name:   "{{ domain_name }}"
        domain_netbios_name: "{{ netbios_name }}"
        safe_mode_password: "{{ safe_mode_password }}"
        state: domain_controller
      register: promotion_result

    - name: Reboot after promotion if required
      ansible.windows.win_reboot:
      when: promotion_result.reboot_required
